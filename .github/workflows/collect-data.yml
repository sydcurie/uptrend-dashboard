name: Collect Finviz Data

on:
  schedule:
    # Mon-Fri at 21:30 UTC (= 16:30 ET winter / 17:30 ET summer)
    - cron: '30 21 * * 1-5'
  workflow_dispatch: # Allow manual trigger

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Collect data from Finviz
        env:
          FINVIZ_API_KEY: ${{ secrets.FINVIZ_API_KEY }}
        run: python collect.py --verbose

      - name: Commit and push if DB changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/uptrend.db
          if git diff --cached --quiet; then
            echo "No data changes to commit"
          else
            git commit -m "Update uptrend data $(date -u +%Y-%m-%d)"
            git push
          fi
