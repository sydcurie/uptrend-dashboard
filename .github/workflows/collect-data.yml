name: Collect Finviz Data

on:
  schedule:
    # 13:10 PDT (UTC-7, Mar-Nov) = 20:10 UTC
    - cron: '10 20 * * 1-5'
    # 13:10 PST (UTC-8, Nov-Mar) = 21:10 UTC
    - cron: '10 21 * * 1-5'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

concurrency:
  group: collect-data
  cancel-in-progress: false

jobs:
  check-time:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: Check DST offset matches fired schedule
        id: check
        run: |
          SCHEDULE="${{ github.event.schedule }}"
          TZ_OFFSET=$(TZ='America/Los_Angeles' date +%z)
          echo "Fired schedule: ${SCHEDULE}, Pacific offset: ${TZ_OFFSET}"
          if [ "$SCHEDULE" = "10 20 * * 1-5" ] && [ "$TZ_OFFSET" = "-0700" ]; then
            echo "PDT schedule fired during PDT — running"
            echo "should_run=true" >> $GITHUB_OUTPUT
          elif [ "$SCHEDULE" = "10 21 * * 1-5" ] && [ "$TZ_OFFSET" = "-0800" ]; then
            echo "PST schedule fired during PST — running"
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "Schedule/offset mismatch — skipping"
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi

  collect:
    needs: check-time
    if: needs.check-time.outputs.should_run == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Collect data from Finviz
        env:
          FINVIZ_API_KEY: ${{ secrets.FINVIZ_API_KEY }}
        run: python collect.py --scope all --verbose

      - name: Export CSV files
        run: python export_csv.py --verbose

      - name: Commit and push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/uptrend.db data/uptrend_ratio_timeseries.csv data/sector_summary.csv data/industry_summary.csv data/sector_dispersion.csv
          if git diff --cached --quiet; then
            echo "No data changes to commit"
          else
            git commit -m "Update uptrend data $(date -u +%Y-%m-%d)"
            git pull --rebase
            git push
          fi
